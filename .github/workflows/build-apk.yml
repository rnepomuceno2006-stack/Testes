name: Build APK — Viva Parintins!!!

on:
  push:
    branches: [ main, master, "claude/**" ]
  workflow_dispatch:           # permite rodar manualmente pelo botão no GitHub

jobs:
  build-apk:
    name: Gerar APK Android
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código-fonte ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 (requerido pelo Gradle/Android) ───────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── 4. Dependências npm (Capacitor) ──────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Android SDK via sdk-manager ──────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. Build pasta www/ com assets do jogo ──────────────────────────
      - name: Build web assets (www/)
        run: npm run build

      # ── 7. Adiciona plataforma Android (se pasta não existir) ────────────
      - name: Capacitor add android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # ── 8. Copia assets web → Android WebView ────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Permissão de execução para o Gradle wrapper ───────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 9. Build do APK debug (para testes) ──────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 10. Sobe o APK como artefato para download ───────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Viva-Parintins-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ── Build de RELEASE (AAB para Play Store) — roda apenas em push para main ──
  build-aab:
    name: Gerar AAB (Play Store)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web assets (www/)
        run: npm run build

      - name: Capacitor add android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Decodifica keystore guardada como secret no GitHub
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/viva-parintins.keystore

      - name: Build Release AAB
        working-directory: android
        env:
          KEYSTORE_FILE: viva-parintins.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "app/viva-parintins.keystore" ]; then
            ./gradlew bundleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/viva-parintins.keystore \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              --no-daemon
          else
            ./gradlew bundleDebug --no-daemon
          fi

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Viva-Parintins-release-aab
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/bundle/debug/app-debug.aab
          retention-days: 30
